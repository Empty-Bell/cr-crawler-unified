name: Daily CR Crawl

on:
  schedule:
    - cron: '0 23 * * *' # 매일 UTC 23:00 (한국 시간 오전 8시 00분) 실행
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 파일 변경사항 커밋 및 푸시 권한 추가

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Google Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Run Crawler
      env:
        CR_EMAIL: ${{ secrets.CR_EMAIL }}
        CR_PASSWORD: ${{ secrets.CR_PASSWORD }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        SMTP_SERVER: "smtp.gmail.com"
        SMTP_PORT: 587
      run: python cr_crawler_unified.py

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add *.xlsx
        git commit -m "Auto-update CR ratings [skip ci]" || echo "No changes to commit"
        git push
